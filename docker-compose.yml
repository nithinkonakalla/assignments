version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: charttrader
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/charttrader
      JWT_SECRET: super-secret
      RAZORPAY_KEY_ID: rzp_test_key
      RAZORPAY_KEY_SECRET: rzp_test_secret
    ports:
      - '4000:4000'
    depends_on:
      - postgres

  websocket-service:
    build: ./websocket-service
    ports:
      - '8080:8080'

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_WS_URL: ws://localhost:8080
    depends_on:
      - backend
      - websocket-service

volumes:
  pgdata:
